<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Editor</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/continuelist.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/placeholder.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    .CodeMirror {
      height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.75;
      background: #1e1e2e;
      color: #cdd6f4;
      border: none;
    }

    .CodeMirror-scroll {
      padding: 24px 10%;
    }

    .CodeMirror-scroll::-webkit-scrollbar { width: 6px; }
    .CodeMirror-scroll::-webkit-scrollbar-track { background: transparent; }
    .CodeMirror-scroll::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }

    /* Markdown syntax highlighting */
    .cm-header         { color: #cba6f7 !important; font-weight: bold; }
    .cm-header-1       { font-size: 1.4em; }
    .cm-header-2       { font-size: 1.2em; }
    .cm-header-3       { font-size: 1.1em; }
    .cm-strong         { color: #f9e2af !important; font-weight: bold; }
    .cm-em             { color: #89dceb !important; font-style: italic; }
    .cm-strikethrough  { color: #6c7086 !important; }
    .cm-link           { color: #89b4fa !important; }
    .cm-url            { color: #74c7ec !important; }
    .cm-quote          { color: #a6e3a1 !important; font-style: italic; }
    .cm-formatting     { color: #6c7086 !important; }
    .cm-formatting-list { color: #cba6f7 !important; }

    .CodeMirror-cursor  { border-left: 2px solid #cba6f7; }
    .CodeMirror-selected { background: rgba(203,166,247,0.18) !important; }
    .CodeMirror pre.CodeMirror-placeholder { color: #6c7086; }
  </style>
</head>
<body>
  <textarea id="editor"></textarea>

  <script>
    // ── State ────────────────────────────────────────────────────────────────
    const sn = { sessionKey: null, note: null, ready: false };

    // ── CodeMirror ───────────────────────────────────────────────────────────
    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'markdown',
      lineWrapping: true,
      autofocus: true,
      extraKeys: { Enter: 'newlineAndIndentContinueMarkdownList' },
      placeholder: 'Start writing…',
      indentWithTabs: false,
      tabSize: 2,
    });

    // ── Save to Standard Notes (this IS the native SN save) ──────────────────
    // SN has no separate save function — all editors use this exact postMessage.
    // Calling this is identical to what SN's own built-in editors do internally.
    let debounceTimer = null;
    cm.on('change', function () {
      if (!sn.ready) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () {
        window.parent.postMessage({
          action: 'save-items',
          data: {
            items: [{
              uuid: sn.note.uuid,
              content: { text: cm.getValue() }
            }]
          },
          sessionKey: sn.sessionKey,
          api: 'component',
        }, '*');
      }, 300); // 300ms debounce — saves 300ms after you stop typing
    });

    // ── Standard Notes Message Handler ───────────────────────────────────────
    window.addEventListener('message', function (event) {
      const msg = event.data;
      if (!msg || !msg.action) return;

      // Step 2: SN confirms registration and gives us the sessionKey
      if (msg.action === 'component-registered') {
        sn.sessionKey = msg.sessionKey;

        // Step 3: Ask SN to stream the current note to us
        window.parent.postMessage({
          action: 'stream-context-item',
          api: 'component',
          sessionKey: sn.sessionKey,
        }, '*');
      }

      // Step 4: SN sends the note — load it into the editor
      if (msg.action === 'stream-context-item') {
        const item = msg.data && msg.data.item;
        if (!item) return;

        sn.note = item;
        const text = (item.content && item.content.text) ? item.content.text : '';

        if (!sn.ready) {
          // Initial load — set content without triggering a save
          sn.ready = false;
          cm.setValue(text);
          cm.clearHistory();
          sn.ready = true;
        } else {
          // Note updated externally (e.g. sync from another device)
          const cursor = cm.getCursor();
          sn.ready = false;
          cm.setValue(text);
          sn.ready = true;
          cm.setCursor(cursor);
        }
      }
    });

    // Step 1: Announce ourselves to Standard Notes
    window.parent.postMessage({ action: 'ready', api: 'component' }, '*');
  </script>
</body>
</html>
