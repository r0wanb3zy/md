<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Editor</title>

  <!-- CodeMirror -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/continuelist.min.js"></script>

  <!-- The SAME API used by Excalidraw and all working SN plugins -->
  <script src="https://unpkg.com/sn-extension-api@latest/dist/sn-extension-api.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      /* Uses SN's own theme variables so it matches whatever theme the user has */
      background-color: var(--sn-stylekit-background-color, #ffffff);
      color: var(--sn-stylekit-foreground-color, #000000);
    }

    .CodeMirror {
      height: 100vh;
      font-family: var(--sn-stylekit-editor-font-family, 'Courier New', monospace);
      font-size: var(--sn-stylekit-font-size-editor, 15px);
      line-height: 1.75;
      background: var(--sn-stylekit-background-color, #ffffff);
      color: var(--sn-stylekit-foreground-color, #000000);
      border: none;
    }

    .CodeMirror-scroll {
      padding: 20px 8%;
    }

    .CodeMirror-scroll::-webkit-scrollbar { width: 5px; }
    .CodeMirror-scroll::-webkit-scrollbar-thumb {
      background: var(--sn-stylekit-border-color, #ccc);
      border-radius: 3px;
    }

    /* ── Markdown syntax highlighting ── */
    .cm-header         { font-weight: bold !important; }
    .cm-header-1       { font-size: 1.5em !important; color: #7c3aed !important; }
    .cm-header-2       { font-size: 1.3em !important; color: #6d28d9 !important; }
    .cm-header-3       { font-size: 1.1em !important; color: #5b21b6 !important; }
    .cm-strong         { color: #b45309 !important; font-weight: bold !important; }
    .cm-em             { color: #0369a1 !important; font-style: italic !important; }
    .cm-strikethrough  { color: #9ca3af !important; text-decoration: line-through !important; }
    .cm-link           { color: #0284c7 !important; }
    .cm-url            { color: #0ea5e9 !important; }
    .cm-quote          { color: #059669 !important; font-style: italic !important; }
    .cm-formatting     { color: #9ca3af !important; }
    .cm-formatting-list { color: #7c3aed !important; }
    .cm-hr             { color: #9ca3af !important; }

    .CodeMirror-cursor  { border-left: 2px solid #7c3aed !important; }
    .CodeMirror-selected { background: rgba(124,58,237,0.12) !important; }
  </style>
</head>
<body>
  <textarea id="editor"></textarea>

  <script>
    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'markdown',
      lineWrapping: true,
      autofocus: true,
      extraKeys: { Enter: 'newlineAndIndentContinueMarkdownList' },
      indentWithTabs: false,
      tabSize: 2,
    });

    // ── Initialize the official SN API (same as Excalidraw plugin) ────────────
    // This handles ALL the postMessage handshaking internally.
    // We just set snApi.text and it saves. That's it.
    snApi.initialize();

    // When SN sends us the note, load it into CodeMirror
    snApi.subscribe(() => {
      const currentText = snApi.text || '';
      if (cm.getValue() !== currentText) {
        const cursor = cm.getCursor();
        cm.setValue(currentText);
        cm.setCursor(cursor);
      }
    });

    // When the user types, update snApi.text — this triggers the save automatically
    cm.on('change', function () {
      snApi.text = cm.getValue();
    });
  </script>
</body>
</html>
