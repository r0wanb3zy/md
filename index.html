<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Markdown Editor</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/markdown/markdown.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/continuelist.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/display/placeholder.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1e1e2e; color: #cdd6f4; }

    .CodeMirror {
      height: 100vh;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      line-height: 1.75;
      background: #1e1e2e;
      color: #cdd6f4;
      border: none;
    }
    .CodeMirror-scroll { padding: 24px 10%; }
    .CodeMirror-scroll::-webkit-scrollbar { width: 6px; }
    .CodeMirror-scroll::-webkit-scrollbar-thumb { background: #313244; border-radius: 3px; }

    .cm-header         { color: #cba6f7 !important; font-weight: bold; }
    .cm-header-1       { font-size: 1.4em; }
    .cm-header-2       { font-size: 1.2em; }
    .cm-header-3       { font-size: 1.1em; }
    .cm-strong         { color: #f9e2af !important; font-weight: bold; }
    .cm-em             { color: #89dceb !important; font-style: italic; }
    .cm-strikethrough  { color: #6c7086 !important; }
    .cm-link           { color: #89b4fa !important; }
    .cm-url            { color: #74c7ec !important; }
    .cm-quote          { color: #a6e3a1 !important; font-style: italic; }
    .cm-formatting     { color: #6c7086 !important; }
    .cm-formatting-list { color: #cba6f7 !important; }
    .CodeMirror-cursor  { border-left: 2px solid #cba6f7; }
    .CodeMirror-selected { background: rgba(203,166,247,0.18) !important; }
    .CodeMirror pre.CodeMirror-placeholder { color: #6c7086; }
  </style>
</head>
<body>
  <textarea id="editor"></textarea>

  <script>
    const sn = { sessionKey: null, note: null, ready: false };

    // SN requires a unique messageId on every outgoing message
    function uuid() {
      return ([1e7]+-1e3+-4e3+-8e3+-1e11).replace(/[018]/g, function(c) {
        return (c ^ crypto.getRandomValues(new Uint8Array(1))[0] & 15 >> c / 4).toString(16);
      });
    }

    function postToSN(action, data) {
      const msg = {
        action: action,
        data: data || {},
        messageId: uuid(),
        sessionKey: sn.sessionKey,
        api: 'component',
      };
      window.parent.postMessage(msg, '*');
    }

    const cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
      mode: 'markdown',
      lineWrapping: true,
      autofocus: true,
      extraKeys: { Enter: 'newlineAndIndentContinueMarkdownList' },
      placeholder: 'Start writing…',
      indentWithTabs: false,
      tabSize: 2,
    });

    // Save to SN on every keystroke (debounced)
    let debounceTimer = null;
    cm.on('change', function () {
      if (!sn.ready || !sn.note) return;
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function () {
        const text = cm.getValue();
        // Preserve all existing content fields, only update text + preview
        const content = Object.assign({}, sn.note.content, {
          text: text,
          preview_plain: text.substring(0, 255),
        });
        postToSN('save-items', {
          items: [{
            uuid: sn.note.uuid,
            content: content,
            content_type: 'Note',
          }]
        });
      }, 300);
    });

    // Handle messages from Standard Notes
    window.addEventListener('message', function (event) {
      let msg = event.data;
      // SN mobile sends stringified JSON
      if (typeof msg === 'string') {
        try { msg = JSON.parse(msg); } catch (e) { return; }
      }
      if (!msg || !msg.action) return;

      if (msg.action === 'component-registered') {
        sn.sessionKey = msg.sessionKey;
        // Request the current note
        postToSN('stream-context-item', {});
      }

      if (msg.action === 'stream-context-item') {
        const item = msg.data && msg.data.item;
        if (!item) return;

        sn.note = item;
        const text = (item.content && item.content.text) ? item.content.text : '';

        if (!sn.ready) {
          cm.setValue(text);
          cm.clearHistory();
          sn.ready = true;
        } else {
          const cursor = cm.getCursor();
          sn.ready = false;
          cm.setValue(text);
          sn.ready = true;
          cm.setCursor(cursor);
        }
      }
    });

    // Tell SN we are ready — it will respond with component-registered + sessionKey
    postToSN('ready', {});
  </script>
</body>
</html>
